<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" role="img" aria-label="デザインペーパー">
  <defs>
    <linearGradient id="gp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef3ea"/><stop offset="1" stop-color="#d8e6d3"/>
    </linearGradient>
    <pattern id="dotp" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="3" fill="#a7c4a0"/>
    </pattern>
    <pattern id="stripe" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="9" height="18" fill="#f1b8ac"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#gp)"/>
  <g>
    <rect x="48" y="70" width="150" height="190" rx="6" fill="#fff" stroke="#cdd8c7" transform="rotate(-7 123 165)"/>
    <rect x="56" y="78" width="134" height="174" fill="url(#dotp)" opacity=".7" transform="rotate(-7 123 165)"/>
    <rect x="150" y="55" width="150" height="190" rx="6" fill="#fff" stroke="#e7c8c1" transform="rotate(6 225 150)"/>
    <rect x="158" y="63" width="134" height="174" fill="url(#stripe)" opacity=".55" transform="rotate(6 225 150)"/>
  </g>
</svg>
