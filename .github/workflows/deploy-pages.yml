name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時に1つのデプロイのみ実行（進行中のものはキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pages を有効化（未設定なら自動で有効化し、配信元を Actions に切り替える）
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # リポジトリ全体を成果物としてアップロード
      # （既存の授業資料は残り、ショップは /digital-shop/ で公開される）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
